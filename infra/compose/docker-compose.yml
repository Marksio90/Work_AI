services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ../../.env.example
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    command: celery -A packages.queue.celery_app worker --loglevel=INFO
    env_file:
      - ../../.env.example
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
