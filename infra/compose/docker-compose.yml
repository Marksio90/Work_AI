name: work-ai

x-app-base: &app-base
  build:
    context: ../../
    dockerfile: infra/docker/Dockerfile
  env_file:
    - ../../.env.example
  environment:
    DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://workai:workai@postgres:5432/workai}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workai
      POSTGRES_USER: workai
      POSTGRES_PASSWORD: workai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workai -d workai"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  migrate:
    <<: *app-base
    command: alembic upgrade head
    restart: "no"

  api:
    <<: *app-base
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    <<: *app-base
    command: celery -A packages.queue.celery_app worker --loglevel=INFO
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
